apiVersion: v1
kind: ServiceAccount
metadata:
  name:  resource-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resource-manager
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: resource-manager
subjects:
- kind: ServiceAccount
  name: resource-manager
  namespace: default
roleRef:
  kind: ClusterRole
  name: resource-manager
  apiGroup: rbac.authorization.k8s.io